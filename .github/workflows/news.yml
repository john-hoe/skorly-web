name: Daily News

# Full pipeline: signal radar (P1) -> fact-checked 4-language generation (P2)
# -> static build + deploy to Cloudflare Workers.
#
# All secrets come from the single `DOTENV` repository secret (the full root
# .env). Triggered on a schedule and manually; never on pull_request, so
# secrets are never exposed to forks.

on:
  schedule:
    # 01:00 UTC daily == 08:00 WIB (Jakarta) / 08:00 ICT (Hanoi)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many pending topics to turn into news"
        required: false
        default: "6"
      skip_radar:
        description: "Skip signal radar; only generate from existing pending topics"
        type: boolean
        required: false
        default: false

# Never let two runs deploy on top of each other.
concurrency:
  group: daily-news
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize env
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          printf '%s\n' "$DOTENV" > .env
          cp .env apps/web/.env.local

      - name: Signal radar (P1)
        if: ${{ inputs.skip_radar != true }}
        run: pnpm tsx --env-file=.env apps/jobs/scripts/run-news.ts
        continue-on-error: true

      - name: Generate news (P2)
        run: pnpm tsx --env-file=.env apps/jobs/scripts/run-generate-news.ts ${{ inputs.count || '6' }}

      - name: Build & deploy to Cloudflare
        run: |
          set -a
          . ./.env
          set +a
          pnpm --filter @skorly/web cf:deploy
