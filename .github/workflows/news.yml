name: Daily News

# Full pipeline: signal radar (P1) -> fact-checked 4-language generation (P2)
# -> static build + deploy to Cloudflare Workers.
#
# All secrets come from the single `DOTENV` repository secret (the full root
# .env). Triggered on a schedule and manually; never on pull_request, so
# secrets are never exposed to forks.

on:
  schedule:
    # 01:00 UTC daily == 08:00 WIB (Jakarta) / 08:00 ICT (Hanoi)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many pending topics to turn into news"
        required: false
        default: "6"
      skip_radar:
        description: "Skip signal radar; only generate from existing pending topics"
        type: boolean
        required: false
        default: false

# Never let two runs deploy on top of each other.
concurrency:
  group: daily-news
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    # Generation is ~10-13 min/topic (4 langs + web fact-check); 6 topics plus
    # the ~6 min build+deploy can approach ~90 min, so give generous headroom.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize env
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          printf '%s\n' "$DOTENV" > .env
          # Use Supabase SESSION pooler (5432) instead of TRANSACTION pooler
          # (6543): session mode keeps a stable, persistent connection, which a
          # long cross-region SSG build / generation script needs (the txn
          # pooler recycles connections mid-build and stalls page generation).
          sed -i 's/\.pooler\.supabase\.com:6543/.pooler.supabase.com:5432/g' .env
          cp .env apps/web/.env.local

      - name: Signal radar (P1)
        if: ${{ inputs.skip_radar != true }}
        continue-on-error: true
        run: |
          n=0
          until pnpm tsx --env-file=.env apps/jobs/scripts/run-news.ts; do
            n=$((n+1)); [ "$n" -ge 3 ] && { echo "radar failed after $n attempts"; exit 1; }
            echo "radar attempt $n failed; retry in 20s"; sleep 20
          done

      - name: Generate news (P2)
        run: |
          n=0
          until pnpm tsx --env-file=.env apps/jobs/scripts/run-generate-news.ts ${{ inputs.count || '6' }}; do
            n=$((n+1)); [ "$n" -ge 3 ] && { echo "generate failed after $n attempts"; exit 1; }
            echo "generate attempt $n failed; retry in 20s"; sleep 20
          done

      - name: Build & deploy to Cloudflare
        run: |
          set -a
          . ./.env
          set +a
          n=0
          until pnpm --filter @skorly/web cf:deploy; do
            n=$((n+1)); [ "$n" -ge 2 ] && { echo "deploy failed after $n attempts"; exit 1; }
            echo "deploy attempt $n failed; retry in 30s"; sleep 30
          done
